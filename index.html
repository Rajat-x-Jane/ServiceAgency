<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GSAP Navbar</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</head>
<body>

<nav class="navbar">

<div class="logo">TechBridge</div>

<ul class="nav-links">
<li data-page="home">Home</li>
<li data-page="about">About</li>
<li data-page="services">Services</li>
<li data-page="portfolio">Portfolio</li>
<li data-page="contact">Contact</li>
</ul>

<button class="cta">Get Quote</button>

</nav>


<main>

<section id="home" class="page active">
<h1>Home Section</h1>
</section>

<section id="about" class="page">
<h1>About Section</h1>
</section>

<section id="services" class="page">
<h1>Services Section</h1>
</section>

<section id="portfolio" class="page">
<h1>Portfolio Section</h1>
</section>

<section id="contact" class="page">
<h1>Contact Section</h1>
</section>

</main>

<script src="script.js"></script>

</body>
</html>
